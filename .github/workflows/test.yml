name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: command -v jq || brew install jq

      - name: Lint shell scripts
        run: |
          bash -n claude-cluster
          bash -n install.sh
          bash -n tests/test_schema.sh

      - name: Run migration regression test
        run: bash tests/test_schema.sh
