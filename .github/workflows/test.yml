name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: command -v jq || brew install jq

      - name: Lint shell scripts
        run: |
          bash -n claude-cluster
          bash -n install.sh
          for f in tests/test_*.sh; do bash -n "$f"; done

      - name: Run all tests
        run: |
          for f in tests/test_*.sh; do
            echo "=== $f ==="
            bash "$f" || exit 1
          done
